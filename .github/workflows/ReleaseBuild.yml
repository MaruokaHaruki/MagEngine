name: ReleaseBuild

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: MagEngine.sln
  CONFIGURATION: Release
  PLATFORM: x64

jobs:

  build:

    # VS2026対応
    runs-on: windows-latest

    steps:

      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4


      # 2️⃣ Cache NuGet
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-


      # 3️⃣ MSBuild setup
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2


      # 4️⃣ Restore
      - name: Restore dependencies
        run: nuget restore ${{ env.SOLUTION_FILE_PATH }}


      # 5️⃣ Release build (2026対応)
      - name: Build Solution (Release)
        run: |
          msbuild ${{ env.SOLUTION_FILE_PATH }} ^
            /m ^
            /p:Configuration=${{ env.CONFIGURATION }} ^
            /p:Platform=${{ env.PLATFORM }} ^
            /p:PlatformToolset=v145 ^
            /p:WindowsTargetPlatformVersion=10.0


      # 6️⃣ Upload artifacts
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MagEngine-${{ env.CONFIGURATION }}
          path: |
            **/x64/${{ env.CONFIGURATION }}/
            !**/*.pdb


      # 7️⃣ Create Release (tag build only)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/x64/${{ env.CONFIGURATION }}/*.exe
            **/x64/${{ env.CONFIGURATION }}/*.dll